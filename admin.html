<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡密管理面板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft YaHei', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .panel {
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    background: #1a1a2e;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 8px;
    color: #ff6b9d;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #333;
  }
  .tabs button {
    flex: 1;
    padding: 10px;
    border: none;
    background: #12121f;
    color: #888;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tabs button.active {
    background: #ff6b9d;
    color: #fff;
  }
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 12px;
    font-weight: bold;
    color: #666;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #999;
    margin-bottom: 4px;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #12121f;
    color: #e0e0e0;
    font-size: 14px;
    font-family: 'Consolas', 'Courier New', monospace;
    outline: none;
    transition: border 0.2s;
    resize: vertical;
  }
  textarea { min-height: 120px; line-height: 1.6; }
  input:focus, select:focus, textarea:focus { border-color: #ff6b9d; }
  textarea::placeholder { font-family: 'Microsoft YaHei', sans-serif; font-size: 13px; color: #555; }
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  button {
    flex: 1;
    min-width: 100px;
    padding: 14px 16px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-revoke { background: #e74c3c; color: #fff; }
  .btn-revoke:hover:not(:disabled) { background: #c0392b; }
  .btn-unbind { background: #e67e22; color: #fff; }
  .btn-unbind:hover:not(:disabled) { background: #d35400; }
  .btn-restore { background: #3498db; color: #fff; }
  .btn-restore:hover:not(:disabled) { background: #2980b9; }
  .btn-check { background: #2ecc71; color: #fff; }
  .btn-check:hover:not(:disabled) { background: #27ae60; }
  .btn-batch-revoke { background: #c0392b; color: #fff; }
  .btn-batch-revoke:hover:not(:disabled) { background: #922b21; }
  .btn-batch-unbind { background: #d35400; color: #fff; }
  .btn-batch-unbind:hover:not(:disabled) { background: #a04000; }
  .result {
    margin-top: 20px;
    padding: 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Consolas', monospace;
    white-space: pre-wrap;
    word-break: break-all;
    background: #12121f;
    border: 1px solid #333;
    max-height: 400px;
    overflow-y: auto;
  }
  .result .ok { color: #2ecc71; }
  .result .fail { color: #e74c3c; }
  .result .warn { color: #f39c12; }
  .result .info { color: #3498db; }
  .result .summary { color: #ff6b9d; font-weight: bold; margin-top: 8px; border-top: 1px dashed #333; padding-top: 8px; }
  .note {
    margin-top: 20px;
    padding: 12px;
    background: #16213e;
    border-radius: 8px;
    font-size: 12px;
    color: #7f8c8d;
    line-height: 1.8;
  }
  .note strong { color: #ff6b9d; }
  .progress {
    display: none;
    margin-top: 12px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress .bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b9d, #ff6b00);
    border-radius: 2px;
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div class="panel">
  <h1>🔐 卡密管理面板</h1>
  <p class="subtitle">吊销 / 解绑 / 查询 / 恢复</p>

  <div class="tabs">
    <button id="tabSingle" class="active" onclick="switchTab('single')">🎫 单张操作</button>
    <button id="tabBatch" onclick="switchTab('batch')">📦 批量操作</button>
  </div>

  <div class="section">
    <select id="apiUrl">
      <option value="/api">/api（同域默认）</option>
      <option value="https://api.xiaoxiaomuyu.top/api">https://api.xiaoxiaomuyu.top/api（自定义域名）</option>
      <option value="https://cheerful-queijadas-a8a5a4.netlify.app/api">https://cheerful-queijadas-a8a5a4.netlify.app/api（Netlify）</option>
    </select>
  </div>

  <!-- 单张模式 -->
  <div id="singleMode">
    <div class="section">
      <label>🛡️ 管理员密钥</label>
      <input type="password" id="adminKey" value="xiaomuyu2026">
    </div>
    <div class="section">
      <label>🎫 卡密</label>
      <input type="text" id="cardKey" placeholder="输入卡密，如 CG25XXXXXXXX...">
    </div>
    <div class="btn-row">
      <button class="btn-revoke" onclick="revokeCard()">🚫 吊销</button>
      <button class="btn-unbind" onclick="unbindCard()">🔓 解绑</button>
    </div>
    <div class="btn-row">
      <button class="btn-check" onclick="checkCard()">🔍 查询</button>
      <button class="btn-restore" onclick="restoreCard()">🔄 恢复</button>
    </div>
  </div>

  <!-- 批量模式 -->
  <div id="batchMode" style="display:none">
    <div class="section">
      <label>🛡️ 管理员密钥</label>
      <input type="password" id="adminKey2" value="xiaomuyu2026">
    </div>
    <div class="section">
      <label>📋 卡密列表（一行一个）</label>
      <textarea id="cardKeys" placeholder="粘贴卡密，一行一个：&#10;CG25XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX&#10;CG25XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX&#10;..."></textarea>
      <div style="font-size:12px;color:#666;margin-top:4px" id="batchCount"></div>
    </div>
    <div class="btn-row">
      <button class="btn-batch-revoke" onclick="batchRevoke()">🚫 批量吊销</button>
      <button class="btn-batch-unbind" onclick="batchUnbind()">🔓 批量解绑</button>
    </div>
    <div class="progress" id="progress"><div class="bar" id="progressBar" style="width:0%"></div></div>
  </div>

  <div id="result"></div>

  <div class="note">
    <strong>操作说明：</strong><br>
    🚫 <strong>吊销</strong>：禁用卡密，用户收到"已被禁用"提示，卡密无法激活<br>
    🔓 <strong>解绑</strong>：删除绑定，用户可换设备重新激活（卡密可转让）<br>
    🔄 <strong>恢复</strong>：撤销吊销，卡密恢复正常（原设备还在的话）<br>
    📦 <strong>批量</strong>：每行粘贴一个卡密，自动逐条处理，显示成功/失败统计
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let isRunning = false;

// ===== 标签切换 =====
function switchTab(tab) {
  $('tabSingle').className = tab === 'single' ? 'active' : '';
  $('tabBatch').className = tab === 'batch' ? 'active' : '';
  $('singleMode').style.display = tab === 'single' ? '' : 'none';
  $('batchMode').style.display = tab === 'batch' ? '' : 'none';
  $('result').innerHTML = '';
}

// 实时统计行数
$('cardKeys').addEventListener('input', function() {
  const lines = this.value.split('\n').filter(l => l.trim());
  $('batchCount').textContent = '共 ' + lines.length + ' 张卡密';
});

// ===== 单张操作 =====
async function callApi(endpoint, body) {
  const apiBase = $('apiUrl').value;
  const url = apiBase + endpoint;
  $('result').innerHTML = '<span class="info">请求中...</span>';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.code === 200) {
      $('result').innerHTML = '<span class="ok">✅ ' + data.message + '</span>\n' + JSON.stringify(data, null, 2);
    } else {
      $('result').innerHTML = '<span class="fail">❌ ' + (data.message || res.statusText) + ' (code=' + data.code + ')</span>';
    }
  } catch(e) {
    $('result').innerHTML = '<span class="fail">⚠️ 网络错误: ' + e.message + '</span>';
  }
}

async function revokeCard() {
  const a = $('adminKey').value.trim(), c = $('cardKey').value.trim();
  if (!a || !c) { $('result').innerHTML = '<span class="fail">请填写密钥和卡密</span>'; return; }
  await callApi('/revoke', { adminKey: a, cardKey: c });
}
async function unbindCard() {
  const a = $('adminKey').value.trim(), c = $('cardKey').value.trim();
  if (!a || !c) { $('result').innerHTML = '<span class="fail">请填写密钥和卡密</span>'; return; }
  await callApi('/unbind', { adminKey: a, cardKey: c });
}
async function restoreCard() {
  const a = $('adminKey').value.trim(), c = $('cardKey').value.trim();
  if (!a || !c) { $('result').innerHTML = '<span class="fail">请填写密钥和卡密</span>'; return; }
  await callApi('/restore', { adminKey: a, cardKey: c });
}
async function checkCard() {
  const c = $('cardKey').value.trim();
  if (!c) { $('result').innerHTML = '<span class="fail">请填写卡密</span>'; return; }
  $('result').innerHTML = '<span class="info">请求中...</span>';
  try {
    const apiBase = $('apiUrl').value;
    const res = await fetch(apiBase + '/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cardKey: c })
    });
    const data = await res.json();
    if (data.code !== 200) {
      $('result').innerHTML = '<span class="fail">❌ ' + (data.message || res.statusText) + '</span>';
      return;
    }
    var statusLabel = data.status === 'active' ? '✅ 已激活' : data.status === 'revoked' ? '🚫 已吊销' : '⏳ 未激活';
    var ts = data.createdAt;
    var timeStr = '';
    if (ts) {
      var d = new Date(ts);
      timeStr = d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0') + ':' +
        String(d.getSeconds()).padStart(2,'0');
    }
    var html = '<span class="ok">🔍 卡密信息</span>\n';
    html += '卡密：' + data.cardKey + '\n';
    html += '状态：' + statusLabel;
    if (timeStr) html += '\n激活时间：' + timeStr;
    if (data.deviceHash) html += '\n设备：' + data.deviceHash;
    $('result').innerHTML = html;
  } catch(e) {
    $('result').innerHTML = '<span class="fail">⚠️ 网络错误: ' + e.message + '</span>';
  }
}

// ===== 批量操作 =====
function getBatchKeys() {
  return $('cardKeys').value.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0);
}

async function batchOp(endpoint, label) {
  if (isRunning) return;
  const adminKey = $('adminKey2').value.trim();
  if (!adminKey) { $('result').innerHTML = '<span class="fail">请填写管理员密钥</span>'; return; }
  
  const keys = getBatchKeys();
  if (keys.length === 0) { $('result').innerHTML = '<span class="fail">请粘贴至少一张卡密</span>'; return; }
  
  isRunning = true;
  const apiBase = $('apiUrl').value;
  const url = apiBase + endpoint;
  let ok = 0, fail = 0, skip = 0;
  let lines = [];
  const total = keys.length;
  
  $('progress').style.display = 'block';
  $('result').innerHTML = '<span class="info">⏳ 批量' + label + '中... 0/' + total + '</span>';
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    const short = key.length > 16 ? key.substring(0, 16) + '...' : key;
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminKey, cardKey: key })
      });
      const data = await res.json();
      if (data.code === 200) {
        ok++;
        lines.push('<span class="ok">✅ ' + short + '</span> → ' + data.message);
      } else if (data.code === 404) {
        skip++;
        lines.push('<span class="warn">⚠️ ' + short + '</span> → 未绑定（跳过）');
      } else {
        fail++;
        lines.push('<span class="fail">❌ ' + short + '</span> → ' + data.message);
      }
    } catch(e) {
      fail++;
      lines.push('<span class="fail">❌ ' + short + '</span> → 网络错误');
    }
    
    $('progressBar').style.width = ((i + 1) / total * 100) + '%';
    $('result').innerHTML = '<span class="info">⏳ 批量' + label + '中... ' + (i + 1) + '/' + total + '</span>\n' + lines.slice(-8).join('\n');
    
    // 间隔 300ms 避免刷爆接口
    if (i < keys.length - 1) await new Promise(r => setTimeout(r, 300));
  }
  
  const summary = '\n<span class="summary">━━━ ' + label + '完成 ━━━\n✅ 成功: ' + ok + '  |  ⚠️ 跳过: ' + skip + '  |  ❌ 失败: ' + fail + '</span>';
  $('result').innerHTML = lines.join('\n') + summary;
  $('progress').style.display = 'none';
  $('progressBar').style.width = '0%';
  document.querySelectorAll('button').forEach(b => b.disabled = false);
  isRunning = false;
}

async function batchRevoke() { await batchOp('/revoke', '吊销'); }
async function batchUnbind() { await batchOp('/unbind', '解绑'); }
</script>
</body>
</html>
